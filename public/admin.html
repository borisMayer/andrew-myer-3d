<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Admin — Andrew Myer</title>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body { min-height:100vh; background:#09080d; color:rgba(220,215,205,0.9); font-family:'Inter',sans-serif; }
#login-wrap { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; }
.card { width:min(400px,95vw); background:rgba(14,13,18,0.98); border:1px solid rgba(255,255,255,0.07); border-top:2px solid rgba(180,155,90,0.5); border-radius:4px; padding:2rem; }
label { display:block; font-size:10px; letter-spacing:.15em; text-transform:uppercase; color:rgba(160,155,145,0.5); margin-bottom:.3rem; font-family:monospace; }
input,select,textarea { width:100%; padding:.6rem .8rem; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.1); border-radius:3px; color:rgba(220,215,205,0.9); font-size:.875rem; outline:none; margin-bottom:.75rem; }
textarea { resize:vertical; min-height:70px; }
button { padding:.5rem 1.1rem; background:rgba(180,155,90,0.15); border:1px solid rgba(180,155,90,0.45); border-radius:3px; color:rgba(205,178,90,0.95); font-size:11px; letter-spacing:.08em; cursor:pointer; font-family:monospace; transition:all .2s; }
button:hover { background:rgba(180,155,90,0.25); }
button:disabled { opacity:.5; cursor:wait; }
.btn-red { background:rgba(200,70,55,0.1); border-color:rgba(200,70,55,0.3); color:rgba(220,110,90,0.85); }
.btn-gray { background:rgba(255,255,255,0.04); border-color:rgba(255,255,255,0.1); color:rgba(160,155,145,0.7); }
nav { background:rgba(6,5,10,0.98); border-bottom:1px solid rgba(255,255,255,0.06); padding:.85rem 2rem; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
.logo { font-family:Georgia,serif; font-size:1.1rem; color:rgba(235,228,215,0.9); }
.badge-tag { font-family:monospace; font-size:9px; letter-spacing:.15em; text-transform:uppercase; color:rgba(180,155,90,0.5); padding:2px 7px; border:1px solid rgba(180,155,90,0.2); border-radius:2px; }
main { max-width:960px; margin:0 auto; padding:2rem 1.5rem; }
.section { background:rgba(14,13,18,0.9); border:1px solid rgba(255,255,255,0.07); border-radius:4px; overflow:hidden; margin-bottom:1rem; }
.book-row { padding:.85rem 1.25rem; border-bottom:1px solid rgba(255,255,255,0.04); display:flex; align-items:flex-start; justify-content:space-between; gap:1rem; }
.book-title { font-size:.9rem; font-weight:500; color:rgba(215,208,195,0.9); margin-bottom:2px; }
.book-slug { font-family:monospace; font-size:10px; color:rgba(140,135,125,0.5); }
.badge { display:inline-block; padding:2px 7px; border-radius:2px; font-size:10px; font-family:monospace; }
.pub { background:rgba(60,160,80,0.14); border:1px solid rgba(60,160,80,0.3); color:rgba(100,210,130,0.9); }
.dra { background:rgba(180,155,90,0.1); border:1px solid rgba(180,155,90,0.25); color:rgba(180,155,90,0.8); }
.price-tag { display:inline-flex; align-items:center; padding:2px 8px; background:rgba(180,155,90,0.1); border:1px solid rgba(180,155,90,0.2); border-radius:2px; font-family:monospace; font-size:11px; color:rgba(205,178,90,0.9); }
.prices-row { padding:.75rem 1.25rem; background:rgba(255,255,255,0.01); border-top:1px solid rgba(255,255,255,0.04); }
.edit-zone { }
.form-box { padding:1.25rem; background:rgba(14,13,18,0.98); border:1px solid rgba(180,155,90,0.2); border-radius:4px; margin-bottom:1rem; }
.g2 { display:grid; grid-template-columns:1fr 1fr; gap:.75rem; }
.msg-ok { margin-top:.75rem; padding:.55rem .85rem; border-radius:3px; background:rgba(60,160,80,0.12); border:1px solid rgba(60,160,80,0.25); color:rgba(100,210,130,0.9); font-size:.82rem; }
.msg-err { margin-top:.75rem; padding:.55rem .85rem; border-radius:3px; background:rgba(200,70,55,0.1); border:1px solid rgba(200,70,55,0.25); color:rgba(220,110,90,0.9); font-size:.82rem; }
.tab-btn { padding:.35rem .85rem; background:transparent; border:1px solid rgba(255,255,255,0.07); border-radius:3px; color:rgba(155,150,140,0.6); font-size:11px; letter-spacing:.08em; font-family:monospace; text-transform:uppercase; cursor:pointer; }
.tab-btn.active { background:rgba(180,155,90,0.14); border-color:rgba(180,155,90,0.4); color:rgba(195,170,80,0.95); }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-wrap">
  <div class="card">
    <p style="font-family:monospace;font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:rgba(180,155,90,0.5);margin-bottom:.4rem">Panel de administración</p>
    <h1 style="font-family:Georgia,serif;font-size:1.5rem;font-weight:400;color:rgba(235,228,215,0.95);margin-bottom:1.5rem">Andrew Myer</h1>
    <label>Email</label>
    <input type="email" id="inp-email" value="admin@andrewmyer.com">
    <label>Contraseña</label>
    <input type="password" id="inp-pw" onkeydown="if(event.key==='Enter')doLogin()">
    <div id="login-err"></div>
    <button onclick="doLogin()" id="login-btn" style="width:100%;display:block;padding:.7rem;font-size:13px">Ingresar</button>
  </div>
</div>

<!-- PANEL -->
<div id="panel-wrap" style="display:none">
  <nav>
    <div style="display:flex;align-items:center;gap:.75rem">
      <span class="logo">Andrew Myer</span>
      <span class="badge-tag">Admin</span>
    </div>
    <div style="display:flex;gap:.5rem;align-items:center">
      <a href="/" style="font-family:monospace;font-size:10px;color:rgba(140,135,125,0.6);text-decoration:none;margin-right:.5rem">← Sitio</a>
      <button class="tab-btn active" id="tab-libros" onclick="showTab('libros')">Libros</button>
      <button class="tab-btn" id="tab-ventas" onclick="showTab('ventas')">Ventas</button>
      <button class="tab-btn" id="tab-newsletter" onclick="showTab('newsletter')">Newsletter</button>
      <button class="btn-gray" style="font-size:10px" onclick="doLogout()">Salir</button>
    </div>
  </nav>
  <main>
    <div id="tab-libros-content"></div>
    <div id="tab-ventas-content" style="display:none"></div>
    <div id="tab-newsletter-content" style="display:none"></div>
  </main>
</div>

<script>
var TOKEN = localStorage.getItem('am_token') || '';

// ── Auth ──────────────────────────────────────────────────────────────────
async function doLogin() {
  var btn = document.getElementById('login-btn');
  var errEl = document.getElementById('login-err');
  btn.disabled = true; btn.textContent = 'Autenticando…'; errEl.innerHTML = '';
  try {
    var r = await fetch('/api/admin/login', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        email: document.getElementById('inp-email').value,
        password: document.getElementById('inp-pw').value
      })
    });
    var text = await r.text();
    var d;
    try { d = JSON.parse(text); } catch(e) { throw new Error('Respuesta inválida: ' + text.slice(0,80)); }
    if (!r.ok) throw new Error(d.error || 'Error ' + r.status);
    TOKEN = d.token;
    localStorage.setItem('am_token', TOKEN);
    showPanel();
  } catch(e) {
    errEl.innerHTML = '<div class="msg-err">' + e.message + '</div>';
  } finally {
    btn.disabled = false; btn.textContent = 'Ingresar';
  }
}

function doLogout() {
  localStorage.removeItem('am_token'); TOKEN = '';
  document.getElementById('panel-wrap').style.display = 'none';
  document.getElementById('login-wrap').style.display = 'flex';
}

function showPanel() {
  document.getElementById('login-wrap').style.display = 'none';
  document.getElementById('panel-wrap').style.display = 'block';
  loadLibros();
}

// Auto-login
if (TOKEN) {
  fetch('/api/admin/sales', {headers:{Authorization:'Bearer '+TOKEN}})
    .then(function(r) {
      if (r.status === 200) { showPanel(); }
      else { localStorage.removeItem('am_token'); TOKEN = ''; }
    })
    .catch(function() { localStorage.removeItem('am_token'); TOKEN = ''; });
}

// ── Tabs ──────────────────────────────────────────────────────────────────
function showTab(tab) {
  ['libros','ventas','newsletter'].forEach(function(t) {
    document.getElementById('tab-'+t+'-content').style.display = tab===t ? 'block' : 'none';
    document.getElementById('tab-'+t).classList.toggle('active', tab===t);
  });
  if (tab==='ventas') loadVentas();
  if (tab==='newsletter') loadNewsletter();
}

// ── LIBROS ────────────────────────────────────────────────────────────────
async function loadLibros() {
  var el = document.getElementById('tab-libros-content');
  el.innerHTML = '<p style="color:rgba(160,155,145,0.5);padding:1rem">Cargando…</p>';
  var r = await fetch('/api/books?published=false', {headers:{Authorization:'Bearer '+TOKEN}});
  var d = await r.json();
  renderLibros(d.books || []);
}

function renderLibros(books) {
  var el = document.getElementById('tab-libros-content');
  var rows = books.length === 0
    ? '<p style="padding:1.5rem;color:rgba(160,155,145,0.5);font-size:.875rem">Sin libros. Crea el primero.</p>'
    : books.map(bookRowHtml).join('');
  el.innerHTML = '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem">'
    + '<h2 style="font-family:Georgia,serif;font-size:1.3rem;font-weight:400;color:rgba(235,228,215,0.95)">Catálogo</h2>'
    + '<button onclick="showNewForm()">+ Nuevo libro</button>'
    + '</div><div id="new-form-zone"></div>'
    + '<div class="section">' + rows + '</div>';
  // Attach events
  el.querySelectorAll('[data-action="edit"]').forEach(function(btn) {
    btn.addEventListener('click', function() { editLibro(this.dataset.id); });
  });
  el.querySelectorAll('[data-action="pub"]').forEach(function(btn) {
    btn.addEventListener('click', function() { togglePub(this.dataset.id, this.dataset.val === 'true'); });
  });
  el.querySelectorAll('[data-action="del"]').forEach(function(btn) {
    btn.addEventListener('click', function() { delLibro(this.dataset.id, this.dataset.title); });
  });
  el.querySelectorAll('[data-action="addprice"]').forEach(function(btn) {
    btn.addEventListener('click', function() { addPrice(this.dataset.id); });
  });
}

function bookRowHtml(b) {
  var pub = b.is_published;
  var prices = (b.prices||[]).map(function(p) {
    return '<span class="price-tag">' + p.currency + ' ' + Number(p.amount).toLocaleString() + '</span>';
  }).join(' ');

  return '<div class="book-row">'
    + '<div style="flex:1;min-width:0">'
    + '<div style="display:flex;align-items:center;gap:.5rem;flex-wrap:wrap;margin-bottom:.2rem">'
    + '<span class="badge ' + (pub?'pub':'dra') + '">' + (pub?'● Publicado':'○ Borrador') + '</span>'
    + '<span class="book-slug">' + b.slug + '</span>'
    + '</div>'
    + '<p class="book-title">' + b.title_es + '</p>'
    + (b.title_en ? '<p style="font-family:monospace;font-size:11px;color:rgba(140,135,125,0.45)">' + b.title_en + '</p>' : '')
    + '<div style="display:flex;flex-wrap:wrap;gap:.35rem;margin-top:.5rem">' + (prices||'<span style="font-family:monospace;font-size:10px;color:rgba(140,135,125,0.4)">Sin precios</span>') + '</div>'
    + '<span style="font-family:monospace;font-size:10px;color:' + (b.pdf_url?'rgba(100,210,130,0.7)':'rgba(200,100,80,0.6)') + '">' + (b.pdf_url?'✓ PDF':'✗ Sin PDF') + '</span>'
    + '</div>'
    + '<div style="display:flex;flex-direction:column;gap:.4rem;flex-shrink:0">'
    + '<button data-action="edit" data-id="' + b.id + '">Editar</button>'
    + '<button data-action="pub" data-id="' + b.id + '" data-val="' + (!pub) + '">' + (pub?'Ocultar':'Publicar') + '</button>'
    + '<button class="btn-red" data-action="del" data-id="' + b.id + '" data-title="' + b.title_es.replace(/"/g,'') + '">Eliminar</button>'
    + '</div></div>'
    + '<div class="prices-row">'
    + '<p style="font-family:monospace;font-size:9px;text-transform:uppercase;color:rgba(160,155,145,0.45);margin-bottom:.5rem;letter-spacing:.15em">Agregar / actualizar precio</p>'
    + '<div style="display:flex;gap:.5rem;align-items:flex-end;flex-wrap:wrap">'
    + '<select id="cur-' + b.id + '" style="width:90px;margin:0"><option>CLP</option><option>ARS</option><option>USD</option><option>MXN</option><option>COP</option></select>'
    + '<input type="number" id="amt-' + b.id + '" placeholder="9990" style="width:120px;margin:0">'
    + '<button data-action="addprice" data-id="' + b.id + '">+ Precio</button>'
    + '</div></div>'
    + '<div id="edit-zone-' + b.id + '" class="edit-zone"></div>';
}

async function togglePub(id, pub) {
  var r = await fetch('/api/books/' + id, {
    method:'PUT',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+TOKEN},
    body: JSON.stringify({is_published: pub})
  });
  if (r.ok) loadLibros();
}

async function delLibro(id, title) {
  if (!confirm('¿Eliminar "' + title + '"?')) return;
  await fetch('/api/books/' + id, {method:'DELETE', headers:{Authorization:'Bearer '+TOKEN}});
  loadLibros();
}

async function addPrice(id) {
  var cur = document.getElementById('cur-'+id).value;
  var amt = document.getElementById('amt-'+id).value;
  if (!amt) return alert('Ingresa un monto');
  var r = await fetch('/api/books/prices', {
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+TOKEN},
    body: JSON.stringify({book_id:id, currency:cur, amount:Number(amt), is_active:true})
  });
  if (r.ok) loadLibros();
}

function showNewForm() {
  document.getElementById('new-form-zone').innerHTML = formHtml(null);
  attachFormEvents('new');
}

function editLibro(id) {
  fetch('/api/books/' + id, {headers:{Authorization:'Bearer '+TOKEN}})
    .then(function(r) { return r.json(); })
    .then(function(d) {
      var ez = document.getElementById('edit-zone-' + id);
      if (ez) { ez.innerHTML = formHtml(d.book); attachFormEvents(id); }
    });
}

function formHtml(b) {
  var isNew = !b;
  return '<div class="form-box">'
    + '<p style="font-family:monospace;font-size:11px;color:rgba(180,155,90,0.7);margin-bottom:1rem">' + (isNew?'Nuevo libro':'Editando: '+b.title_es) + '</p>'
    + '<div class="g2"><div><label>Slug *</label><input id="f-slug" value="' + (b?b.slug:'') + '" placeholder="entre-dos-mundos-vol1"></div>'
    + '<div><label>ISBN</label><input id="f-isbn" value="' + (b&&b.isbn?b.isbn:'') + '"></div></div>'
    + '<div class="g2"><div><label>Título ES *</label><input id="f-title-es" value="' + (b?b.title_es:'') + '"></div>'
    + '<div><label>Título EN</label><input id="f-title-en" value="' + (b?b.title_en:'') + '"></div></div>'
    + '<div class="g2"><div><label>Subtítulo ES</label><input id="f-sub-es" value="' + (b&&b.subtitle_es?b.subtitle_es:'') + '"></div>'
    + '<div><label>Subtítulo EN</label><input id="f-sub-en" value="' + (b&&b.subtitle_en?b.subtitle_en:'') + '"></div></div>'
    + '<label>Descripción ES</label><textarea id="f-desc-es">' + (b?b.description_es:'') + '</textarea>'
    + '<label>Descripción EN</label><textarea id="f-desc-en">' + (b?b.description_en:'') + '</textarea>'
    + '<div class="g2"><div><label>URL Portada</label><input id="f-cover" value="' + (b&&b.cover_url?b.cover_url:'') + '" placeholder="https://..."></div>'
    + '<div><label>URL PDF</label><input id="f-pdf" value="' + (b&&b.pdf_url?b.pdf_url:'') + '" placeholder="https://..."></div></div>'
    + '<div class="g2"><div><label>Año</label><input id="f-year" type="number" value="' + (b&&b.year?b.year:new Date().getFullYear()) + '"></div>'
    + '<div><label>Orden</label><input id="f-order" type="number" value="' + (b?b.sort_order:0) + '"></div></div>'
    + '<label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:.875rem;color:rgba(200,195,185,0.8);text-transform:none;letter-spacing:0;margin-bottom:1rem">'
    + '<input type="checkbox" id="f-pub"' + (b&&b.is_published?' checked':'') + '> Publicado</label>'
    + '<div id="form-msg"></div>'
    + '<div style="display:flex;gap:.5rem">'
    + '<button id="f-save-btn" data-bid="' + (b?b.id:'') + '">' + (isNew?'Crear libro':'Guardar cambios') + '</button>'
    + '<button class="btn-gray" id="f-cancel-btn">Cancelar</button>'
    + '</div></div>';
}

function attachFormEvents(zoneId) {
  var saveBtn = document.getElementById('f-save-btn');
  var cancelBtn = document.getElementById('f-cancel-btn');
  if (saveBtn) saveBtn.addEventListener('click', function() { saveLibro(this.dataset.bid); });
  if (cancelBtn) cancelBtn.addEventListener('click', function() { loadLibros(); });
}

async function saveLibro(bid) {
  var body = {
    slug: document.getElementById('f-slug').value,
    title_es: document.getElementById('f-title-es').value,
    title_en: document.getElementById('f-title-en').value,
    subtitle_es: document.getElementById('f-sub-es').value || null,
    subtitle_en: document.getElementById('f-sub-en').value || null,
    description_es: document.getElementById('f-desc-es').value,
    description_en: document.getElementById('f-desc-en').value,
    cover_url: document.getElementById('f-cover').value || null,
    pdf_url: document.getElementById('f-pdf').value || null,
    isbn: document.getElementById('f-isbn').value || null,
    year: Number(document.getElementById('f-year').value) || null,
    sort_order: Number(document.getElementById('f-order').value) || 0,
    is_published: document.getElementById('f-pub').checked,
  };
  if (!body.slug || !body.title_es) { alert('Slug y Título ES son requeridos'); return; }
  var saveBtn = document.getElementById('f-save-btn');
  saveBtn.disabled = true; saveBtn.textContent = 'Guardando…';
  var r = await fetch(bid ? '/api/books/'+bid : '/api/books', {
    method: bid ? 'PUT' : 'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+TOKEN},
    body: JSON.stringify(body)
  });
  if (r.ok) { loadLibros(); }
  else { var d=await r.json(); alert('Error: '+d.error); saveBtn.disabled=false; saveBtn.textContent='Guardar'; }
}

// ── VENTAS ────────────────────────────────────────────────────────────────
async function loadVentas() {
  var el = document.getElementById('tab-ventas-content');
  el.innerHTML = '<p style="color:rgba(160,155,145,0.5);padding:1rem">Cargando…</p>';
  try {
    var r = await fetch('/api/admin/sales', {
      headers:{Authorization:'Bearer '+TOKEN, 'Cache-Control':'no-cache'}
    });
    var d = await r.json();
    if (!r.ok) { el.innerHTML = '<p style="color:rgba(220,110,90,0.85);padding:1rem">Error ' + r.status + ': ' + (d.error||'desconocido') + '</p>'; return; }
    var sales = d.sales || [];
    var approved = sales.filter(function(s){return s.status==='APPROVED';}).length;
    var pending  = sales.filter(function(s){return s.status==='PENDING';}).length;
    var total    = sales.reduce(function(acc,s){ return s.status==='APPROVED'?acc+Number(s.amount):acc; },0);
    
    el.innerHTML = '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem">'
      + '<h2 style="font-family:Georgia,serif;font-size:1.3rem;font-weight:400;color:rgba(235,228,215,0.95)">Ventas <span style="font-size:.85rem;font-family:monospace;color:rgba(180,155,90,0.6)">' + sales.length + ' total</span></h2>'
      + '<button onclick="loadVentas()">↻ Actualizar</button></div>'
      + (sales.length>0 ? '<div style="display:flex;gap:1rem;margin-bottom:1.5rem;flex-wrap:wrap">'
        + '<div style="padding:.6rem 1rem;background:rgba(60,160,80,0.1);border:1px solid rgba(60,160,80,0.2);border-radius:3px;font-family:monospace;font-size:11px"><span style="color:rgba(100,210,130,0.8)">● APROBADAS: '+approved+'</span></div>'
        + '<div style="padding:.6rem 1rem;background:rgba(180,155,90,0.08);border:1px solid rgba(180,155,90,0.2);border-radius:3px;font-family:monospace;font-size:11px"><span style="color:rgba(180,155,90,0.7)">○ PENDIENTES: '+pending+'</span></div>'
        + '</div>' : '')
      + (sales.length===0 ? '<p style="color:rgba(160,155,145,0.5);font-size:.875rem">Sin ventas aún.</p>'
      : '<div class="section">' + sales.map(function(s,i) {
          var st = s.status;
          var cls = st==='APPROVED'?'pub':st==='REJECTED'?'btn-red':'dra';
          return '<div style="padding:.85rem 1.25rem;border-bottom:'+(i<sales.length-1?'1px solid rgba(255,255,255,0.04)':'none')+'">'
            + '<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;flex-wrap:wrap">'
            + '<div style="flex:1;min-width:180px">'
            + '<p style="font-size:.875rem;color:rgba(215,208,195,0.88);margin-bottom:3px;font-weight:500">'+s.title_es+'</p>'
            + '<p style="font-family:monospace;font-size:11px;color:rgba(160,155,145,0.65);margin-bottom:3px">'+s.buyer_email+'</p>'
            + '<p style="font-family:monospace;font-size:9px;color:rgba(120,115,105,0.4)">'+new Date(s.created_at).toLocaleString('es-CL')+'</p>'
            + '</div>'
            + '<div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">'
            + '<div style="display:flex;align-items:center;gap:.6rem">'
            + '<span style="font-family:monospace;font-size:13px;color:rgba(210,185,100,0.9)">'+s.currency+' '+Number(s.amount).toLocaleString()+'</span>'
            + '<span class="badge '+cls+'">'+st+'</span>'
            + '</div>'
            + (s.mp_payment_id ? '<span style="font-family:monospace;font-size:9px;color:rgba(100,210,130,0.5)">MP ID: '+s.mp_payment_id+'</span>' : '<span style="font-family:monospace;font-size:9px;color:rgba(180,155,90,0.4)">Esperando confirmación MP</span>')
            + (s.download_token ? '<span style="font-family:monospace;font-size:9px;color:rgba(100,210,130,0.5)">✓ Token descarga activo</span>' : '')
            + '</div></div></div>';
        }).join('') + '</div>');
  } catch(e) {
    el.innerHTML = '<p style="color:rgba(220,110,90,0.85);padding:1rem">Error de red: ' + e.message + '</p>';
  }
}

// ── NEWSLETTER ────────────────────────────────────────────────────────────
async function loadNewsletter() {
  var el = document.getElementById('tab-newsletter-content');
  el.innerHTML = '<p style="color:rgba(160,155,145,0.5);padding:1rem">Cargando…</p>';
  var r = await fetch('/api/newsletter', {headers:{Authorization:'Bearer '+TOKEN}});
  var d = await r.json();
  var subs = d.subscribers || [];
  el.innerHTML = '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem">'
    + '<h2 style="font-family:Georgia,serif;font-size:1.3rem;font-weight:400;color:rgba(235,228,215,0.95)">Newsletter <span style="font-size:.85rem;font-family:monospace;color:rgba(180,155,90,0.7)">'+subs.length+' suscriptores</span></h2>'
    + '<div style="display:flex;gap:.5rem"><button onclick="loadNewsletter()">↻ Actualizar</button>'
    + (subs.length>0?'<button onclick="exportCsv()">↓ Exportar CSV</button>':'')
    + '</div></div>'
    + (subs.length===0 ? '<p style="color:rgba(160,155,145,0.5);font-size:.875rem">Sin suscriptores aún.</p>'
    : '<div class="section">' + subs.map(function(s,i) {
        return '<div style="padding:.7rem 1.25rem;border-bottom:'+(i<subs.length-1?'1px solid rgba(255,255,255,0.04)':'none')+';display:flex;align-items:center;justify-content:space-between">'
          + '<span style="font-family:monospace;font-size:12px;color:rgba(215,208,195,0.85)">'+s.email+'</span>'
          + '<span style="font-family:monospace;font-size:10px;color:rgba(130,125,115,0.45)">'+new Date(s.created_at).toLocaleDateString('es-CL')+'</span>'
          + '</div>';
      }).join('') + '</div>');
}

function exportCsv() {
  fetch('/api/newsletter', {headers:{Authorization:'Bearer '+TOKEN}})
    .then(function(r){return r.json();})
    .then(function(d) {
      var rows = ['Email,Fecha'].concat((d.subscribers||[]).map(function(s){
        return s.email + ',' + new Date(s.created_at).toLocaleDateString('es-CL');
      }));
      var blob = new Blob([rows.join('\r\n')], {type:'text/csv'});
      var a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'suscriptores.csv';
      a.click();
    });
}
</script>
