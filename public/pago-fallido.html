<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pago no completado — Andrew Myer</title>
<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  body { min-height:100vh; background:#09080d; display:flex; align-items:center; justify-content:center; font-family:'Inter',sans-serif; padding:1rem; }
  .card { width:min(480px,95vw); background:rgba(14,13,18,0.98); border:1px solid rgba(255,255,255,0.07); border-top:2px solid rgba(200,70,55,0.5); border-radius:4px; padding:2.5rem 2rem; text-align:center; }
  .icon { width:64px; height:64px; background:rgba(200,70,55,0.1); border:1px solid rgba(200,70,55,0.25); border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto 1.5rem; font-size:28px; }
  h1 { font-family:Georgia,serif; font-size:1.5rem; font-weight:400; color:rgba(235,228,215,0.95); margin-bottom:0.75rem; }
  p { color:rgba(175,168,155,0.75); font-size:0.9rem; line-height:1.7; margin-bottom:1.25rem; }
  .btn { display:inline-block; padding:0.8rem 1.75rem; background:rgba(180,155,90,0.15); border:1px solid rgba(180,155,90,0.4); border-radius:3px; color:#c9a227; text-decoration:none; font-size:0.875rem; }
</style>
</head>
<body>
<div class="card">
  <div class="icon">✕</div>
  <h1>Pago no completado</h1>
  <p>No se realizó ningún cobro. Puedes intentarlo nuevamente con otro método de pago.</p>
  <a href="/#books" class="btn">← Volver a los libros</a>
</div>
</body>
</html>
