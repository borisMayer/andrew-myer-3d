<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Diagnóstico DB — Admin</title>
<style>
  body { background:#09080d; color:#ddd; font-family:monospace; padding:2rem; }
  pre { background:rgba(255,255,255,0.04); padding:1rem; border-radius:3px; overflow-x:auto; font-size:12px; line-height:1.6; }
  button { padding:.5rem 1rem; background:rgba(180,155,90,0.15); border:1px solid rgba(180,155,90,0.4); color:#c9a227; cursor:pointer; border-radius:3px; margin-right:.5rem; margin-bottom:.5rem; }
  input { padding:.5rem; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.1); color:#ddd; border-radius:3px; width:100%; margin-bottom:.75rem; }
  h2 { color:rgba(235,228,215,0.9); font-weight:400; margin-bottom:1rem; }
</style>
</head>
<body>
<h2>🔍 Diagnóstico — Ventas y Webhook</h2>
<input type="text" id="token" placeholder="Token JWT (del admin)">
<div>
  <button onclick="loadSales()">📋 Ver todas las ventas</button>
  <button onclick="testWebhook()">🔧 Test webhook manual</button>
  <button onclick="recoverPending()" style="background:rgba(60,160,80,0.15);border-color:rgba(60,160,80,0.4);color:rgba(100,210,130,0.9)">⚡ RECUPERAR ventas PENDING (consulta MP)</button>
</div>
<pre id="out">Ingresa tu token y haz click en una acción...</pre>

<script>
function getToken() { return document.getElementById('token').value.trim() || localStorage.getItem('am_token') || ''; }
function log(data) { document.getElementById('out').textContent = typeof data === 'string' ? data : JSON.stringify(data, null, 2); }

async function loadSales() {
  log('Cargando ventas...');
  const r = await fetch('/api/admin/sales', {headers:{Authorization:'Bearer '+getToken()}});
  const d = await r.json();
  if (!r.ok) { log('ERROR ' + r.status + ': ' + JSON.stringify(d)); return; }
  const sales = d.sales || [];
  log('TOTAL VENTAS: ' + sales.length + '\n\n' + 
    (sales.length === 0 ? '⚠️ Sin ventas en la DB' :
    sales.map(s => 
      `ID: ${s.id}\n` +
      `Libro: ${s.title_es}\n` +
      `Email: ${s.buyer_email}\n` +
      `Monto: ${s.currency} ${s.amount}\n` +
      `Estado: ${s.status}\n` +
      `MP Payment ID: ${s.mp_payment_id || 'ninguno'}\n` +
      `MP Pref ID: ${s.mp_preference_id || 'ninguno'}\n` +
      `Token descarga: ${s.download_token ? '✅ tiene token' : '❌ sin token'}\n` +
      `Creada: ${new Date(s.created_at).toLocaleString('es-CL')}\n` +
      '─'.repeat(50)
    ).join('\n'))
  );
}

async function testWebhook() {
  log('Probando webhook...');
  const r = await fetch('/api/payment/webhook');
  const d = await r.json();
  log('GET /api/payment/webhook → ' + JSON.stringify(d));
}

async function recoverPending() {
  const token = getToken();
  if (!token) { log('Ingresa tu token primero'); return; }
  log('Consultando Mercado Pago para ventas PENDING...\nEsto puede tardar unos segundos...');
  try {
    const r = await fetch('/api/admin/sales', {
      method: 'POST',
      headers: {Authorization: 'Bearer '+token, 'Content-Type': 'application/json'}
    });
    const d = await r.json();
    if (!r.ok) { log('ERROR: ' + JSON.stringify(d)); return; }
    log('RESULTADO:\n' +
      'Total PENDING procesadas: ' + d.total + '\n' +
      'Recuperadas como APPROVED: ' + d.recovered + '\n\n' +
      'Detalle:\n' +
      (d.results||[]).map(r => 
        `${r.email} | ${r.book}\n` +
        `  Estado MP: ${r.mp_status || 'no encontrado'}\n` +
        `  Resultado: ${r.status}\n` +
        (r.download_url ? `  Descarga: ${r.download_url}\n` : '') +
        (r.error ? `  Error: ${r.error}\n` : '')
      ).join('\n')
    );
  } catch(e) {
    log('Error de red: ' + e.message);
  }
}
</script>
</body>
</html>
